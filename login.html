<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوفينينغ هومز - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-blue-600">لوفينينغ هومز</a>
            <div class="hidden md:flex space-x-reverse space-x-8 text-gray-600">
                <a href="index.html" class="hover:text-blue-600">الرئيسية</a>
                <a href="services.html" class="hover:text-blue-600">خدماتنا</a>
                <a href="about.html" class="hover:text-blue-600">من نحن</a>
                <a href="contact.html" class="hover:text-blue-600">اتصل بنا</a>
            </div>
            <div class="flex items-center gap-4">
                <a href="login.html" class="hidden md:block bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition">دخول</a>
                <button id="hamburger-btn" class="md:hidden text-gray-600 focus:outline-none">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                </button>
            </div>
        </nav>
        <div id="mobile-menu" class="fixed top-0 right-0 h-full w-64 bg-white shadow-2xl z-[60] transform translate-x-full md:hidden transition-transform duration-300 border-l border-gray-100">
            <div class="p-6">
                <button id="close-menu-btn" class="text-gray-500 mb-8"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                <div class="flex flex-col space-y-6 text-lg font-bold text-gray-700">
                    <a href="index.html" class="hover:text-blue-600">الرئيسية</a>
                    <a href="services.html" class="hover:text-blue-600">خدماتنا</a>
                    <a href="about.html" class="hover:text-blue-600">من نحن</a>
                    <a href="contact.html" class="hover:text-blue-600">اتصل بنا</a>
                    <hr>
                    <a href="login.html" class="bg-blue-600 text-white px-6 py-3 rounded-xl hover:bg-blue-700 transition text-center">دخول</a>
                </div>
            </div>
        </div>
        <div id="menu-overlay" class="fixed inset-0 bg-black opacity-50 z-[55] hidden md:hidden"></div>
    </header>

    <!-- Login Content -->
    <section class="container mx-auto px-6 py-20 flex justify-center">
        <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-10 border border-gray-100">
            <div class="text-center mb-8">
                <div class="text-4xl mb-4 text-blue-600">👤</div>
                <h2 class="text-3xl font-bold text-gray-800">تسجيل الدخول</h2>
            </div>
            <form onsubmit="event.preventDefault(); alert('تم الدخول!'); window.location.href='index.html';" class="space-y-6">
                <input type="email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="الإيميل">
                <input type="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="كلمة المرور">
                <button type="submit" class="bg-blue-600 text-white font-bold py-4 px-10 rounded-xl w-full shadow-lg">دخول</button>
            </form>
            <a href="index.html" class="mt-6 w-full text-gray-400 hover:text-gray-600 transition flex items-center justify-center gap-2">العودة للرئيسية</a>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-12">
        <div class="container mx-auto px-6 text-center">
            <div class="text-3xl font-bold mb-6 text-blue-400">لوفينينغ هومز</div>
            <p class="text-gray-400 mb-4">هونغ كونغ - مونغ كوك</p>
            <div class="mt-8 border-t border-gray-800 pt-8 text-sm text-gray-500">
                &copy; 2024 لوفينينغ هومز هونغ كونغ. جميع الحقوق محفوظة.
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
